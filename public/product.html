<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luban Coffee - Product</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #4A2C1A; margin-bottom: 10px; }
        .price { font-size: 36px; color: #D4AF37; font-weight: bold; margin: 20px 0; }
        .description { color: #666; line-height: 1.6; margin: 20px 0; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="name">Loading...</h1>
        <div class="price" id="price">$--.--</div>
        <p class="description" id="desc">Loading...</p>
        <button class="btn" onclick="buy()">🛒 Buy Now</button>
        <p style="margin-top: 20px; font-size: 12px; color: #999;" id="id"></p>
    </div>
    <script>
        const url = new URL(window.location.href);
        const id = url.searchParams.get('id');
        const name = decodeURIComponent(url.searchParams.get('name') || 'Luban Coffee');
        const price = url.searchParams.get('price') || '24.99';
        const desc = decodeURIComponent(url.searchParams.get('desc') || 'Premium Ethiopian coffee');
        document.getElementById('name').innerText = name;
        document.getElementById('price').innerText = `$${price}`;
        document.getElementById('desc').innerText = desc;
        document.getElementById('id').innerText = `Product ID: ${id}`;
        function buy() { alert(`Order ${name} for $${price}`); }
    </script>
</body>
</html>
