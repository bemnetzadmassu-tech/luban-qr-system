<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Luban Coffee</title>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #4A2C1A; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }
        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .error { color: #dc3545; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>☕ Luban Coffee</h1>
        <p class="subtitle">Admin Dashboard Login</p>
        <input type="password" id="password" placeholder="Enter password" onkeypress="if(event.key==='Enter') login()">
        <button onclick="login()">Login</button>
        <div id="error" class="error"></div>
    </div>
    <script>
        // Check if already logged in - redirect immediately
        if (localStorage.getItem('adminToken')) {
            window.location.replace('/admin/index.html');
        }
        
        async function login() {
            const password = document.getElementById('password').value;
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await response.json();
                if (data.success) {
                    localStorage.setItem('adminToken', password);
                    window.location.replace('/admin/index.html');
                } else {
                    document.getElementById('error').innerText = 'Invalid password';
                }
            } catch (error) {
                document.getElementById('error').innerText = 'Login failed';
            }
        }
    </script>
</body>
</html>
