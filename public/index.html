<!DOCTYPE html>
<html>
<head><title>Luban QR</title></head>
<body>
    <h1>☕ Luban Coffee QR System</h1>
    <p>API Status: <span id="status">Checking...</span></p>
    <script>
        fetch('/api/health')
            .then(r => r.json())
            .then(data => document.getElementById('status').innerHTML = data.status)
            .catch(e => document.getElementById('status').innerHTML = 'Error: ' + e.message);
    </script>
</body>
</html>
