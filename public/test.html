<!DOCTYPE html>
<html>
<head>
    <title>Luban QR System</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: #1a1a2e; color: white; }
        .container { background: white; color: black; padding: 30px; border-radius: 20px; max-width: 500px; margin: 0 auto; }
        .status { padding: 10px; border-radius: 10px; margin-bottom: 20px; }
        .online { background: #d4edda; color: green; }
        button { background: #667eea; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>☕ Luban Coffee QR System</h1>
        <div id="status" class="status">Checking API...</div>
        <button onclick="checkAPI()">Test API Connection</button>
        <p id="result"></p>
    </div>
    <script>
        async function checkAPI() {
            const statusDiv = document.getElementById('status');
            const resultDiv = document.getElementById('result');
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                if (data.status === 'ok') {
                    statusDiv.innerHTML = '✅ API is ONLINE';
                    statusDiv.className = 'status online';
                    resultDiv.innerHTML = 'Your QR system is working!';
                }
            } catch (error) {
                statusDiv.innerHTML = '❌ API Error';
                resultDiv.innerHTML = error.message;
            }
        }
        checkAPI();
    </script>
</body>
</html>
